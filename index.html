<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Painter: Army Manager</title>
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --card: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('favicon/background.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .container {
            width: 100%; max-width: 850px;
            background: var(--card);
            padding: 2rem; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        /* Profile/Army Switcher Styling */
        .profile-bar {
            background: #f8fafc;
            padding: 15px; border-radius: 10px;
            margin-bottom: 25px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid #e2e8f0;
        }

        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .header-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

        .input-area { background: #f1f5f9; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #cbd5e1; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        select, input { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; width: 100%; box-sizing: border-box; }

        #add-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .task-item { background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px; border-left: 8px solid var(--primary); display: flex; gap: 15px; position: relative; overflow: hidden; }
        .task-bg { position: absolute; top: 0; right: 0; width: 60%; height: 100%; background-size: cover; opacity: 0.15; z-index: 1; }
        .task-content { position: relative; z-index: 2; flex-grow: 1; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="favicon/favicon.jpg" alt="Logo" class="header-logo">
        <h1>Mini-Painter</h1>
    </div>

    <div class="profile-bar">
        <strong style="font-size: 0.8rem;">ARMY PROFILE:</strong>
        <select id="army-selector" onchange="switchArmy()">
            </select>
        <button onclick="createNewArmy()" class="small-btn">+ New Army</button>
        <button onclick="deleteCurrentArmy()" style="color: var(--danger); background:none; border:none; cursor:pointer; font-size:0.7rem;">Delete Army</button>
    </div>

    <div class="input-area">
        <div class="input-row">
            <select id="faction-select" onchange="updateUnitOptions()">
                <option value="" disabled selected>Select Faction</option>
                <option value="Space Marines">Space Marines</option>
                <option value="Tyranids">Tyranids</option>
                <option value="Orks">Orks</option>
                <option value="Necrons">Necrons</option>
                <option value="Chaos Space Marines">Chaos Space Marines</option>
            </select>
            <select id="unit-select">
                <option value="" disabled selected>Select Unit</option>
            </select>
        </div>
        <div class="input-row">
            <input type="date" id="date-input">
            <select id="priority-input">
                <option value="2">Medium Priority</option>
                <option value="3">High Priority</option>
                <option value="1">Low Priority</option>
            </select>
        </div>
        <button id="add-btn" onclick="addUnitToArmy()">Add Unit to List</button>
    </div>

    <ul id="unit-list" style="list-style: none; padding: 0;"></ul>
</div>

<script>
    // --- THE UNIT DATABASE ---
    const unitDatabase = {
        "Space Marines": ["Captain", "Intercessor Squad", "Terminator Squad", "Redemptor Dreadnought", "Infernus Squad", "Land Raider"],
        "Tyranids": ["Hive Tyrant", "Termagants", "Hormagaunts", "Ripper Swarms", "Screamer-Killer", "Psychophage"],
        "Orks": ["Warboss", "Boyz", "Gretchin", "Nobz", "Deff Dread", "Squighog Boyz"],
        "Necrons": ["Overlord", "Necron Warriors", "Skorpekh Destroyers", "Canoptek Scarabs", "Doomstalker"],
        "Chaos Space Marines": ["Abaddon the Despoiler", "Legionaries", "Chaos Terminators", "Helbrute", "Possessed"]
    };

    let armies = JSON.parse(localStorage.getItem('mini-painter-armies')) || { "My First Army": [] };
    let currentArmyName = localStorage.getItem('current-army-name') || "My First Army";

    function updateUnitOptions() {
        const faction = document.getElementById('faction-select').value;
        const unitSelect = document.getElementById('unit-select');
        unitSelect.innerHTML = '<option value="" disabled selected>Select Unit</option>';
        
        if (unitDatabase[faction]) {
            unitDatabase[faction].forEach(unit => {
                const opt = document.createElement('option');
                opt.value = unit; opt.textContent = unit;
                unitSelect.appendChild(opt);
            });
        }
    }

    function renderArmyList() {
        const list = document.getElementById('unit-list');
        const selector = document.getElementById('army-selector');
        list.innerHTML = '';
        selector.innerHTML = '';

        // Update Dropdown
        Object.keys(armies).forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.textContent = name;
            if(name === currentArmyName) opt.selected = true;
            selector.appendChild(opt);
        });

        // Render Units
        const units = armies[currentArmyName] || [];
        units.forEach((unit, index) => {
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <div class="task-bg" style="background-image: url('https://loremflickr.com/400/200/warhammer,40k,${unit.name}?random=${index}')"></div>
                <div class="task-content">
                    <strong style="font-size:1.2rem">${unit.name}</strong><br>
                    <small>Faction: ${unit.faction} | Due: ${unit.date || 'No Date'}</small>
                </div>
                <button onclick="removeUnit(${index})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold; z-index:10;">X</button>
            `;
            list.appendChild(li);
        });
        
        saveData();
    }

    function addUnitToArmy() {
        const faction = document.getElementById('faction-select').value;
        const unitName = document.getElementById('unit-select').value;
        const date = document.getElementById('date-input').value;

        if (faction && unitName) {
            armies[currentArmyName].push({ name: unitName, faction: faction, date: date });
            renderArmyList();
        }
    }

    function createNewArmy() {
        const name = prompt("Enter Army Name (e.g., 'Ultramarines 2nd Company'):");
        if (name && !armies[name]) {
            armies[name] = [];
            currentArmyName = name;
            renderArmyList();
        }
    }

    function switchArmy() {
        currentArmyName = document.getElementById('army-selector').value;
        renderArmyList();
    }

    function removeUnit(index) {
        armies[currentArmyName].splice(index, 1);
        renderArmyList();
    }

    function deleteCurrentArmy() {
        if (Object.keys(armies).length <= 1) return alert("You must have at least one army.");
        if (confirm(`Delete entire ${currentArmyName} list?`)) {
            delete armies[currentArmyName];
            currentArmyName = Object.keys(armies)[0];
            renderArmyList();
        }
    }

    function saveData() {
        localStorage.setItem('mini-painter-armies', JSON.stringify(armies));
        localStorage.setItem('current-army-name', currentArmyName);
    }

    renderArmyList();
</script>
</body>
</html>
